{% extends "base.html" %}

{% block title %}Delete Job - {{ job.title }}{% endblock %}

{% block content %}
<div class="py-24">
  <div class="max-w-xl mx-auto px-6">
    <div class="bg-white p-12 rounded-[40px] shadow-2xl shadow-rose-100/50 border border-slate-100 text-center">
      <div class="w-20 h-20 bg-rose-50 rounded-3xl flex items-center justify-center mx-auto mb-8 text-rose-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-4">Confirm Deletion</h1>
      <p class="text-slate-500 font-medium leading-relaxed mb-10 italic">
        Are you certain you want to remove <span class="text-slate-900 font-black">"{{ job.title }}"</span>? All associated credentials and applicant data will be permanently purged.
      </p>
      
      <form method="post" class="flex flex-col gap-4">
        {% csrf_token %}
        <button type="submit" class="w-full py-4 bg-rose-600 text-white font-black rounded-2xl hover:bg-rose-700 shadow-xl shadow-rose-100 active:scale-95 transition-all text-lg tracking-tight italic">
          Purge Listing
        </button>
        <a href="{% url 'employer_dashboard' %}" class="w-full py-4 bg-slate-50 text-slate-500 font-bold rounded-2xl hover:bg-slate-100 transition-colors italic uppercase tracking-widest text-[10px]">
          Cancel
        </a>
      </form>
    </div>
  </div>
</div>

{% endblock %}
