{% extends "base.html" %}
{% block title %}Password reset complete{% endblock %}

{% block content %}
<div class="py-24">
  <div class="max-w-xl mx-auto px-6">
    <div class="bg-white p-12 rounded-[40px] shadow-2xl shadow-indigo-200/50 border border-slate-100 text-center">
      <div class="w-20 h-20 bg-emerald-50 rounded-3xl flex items-center justify-center mx-auto mb-8 text-emerald-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-4">Securely Updated</h1>
      <p class="text-slate-500 font-medium leading-relaxed mb-10">
        Your password has been successfully reset. Your account is now protected with your new credentials.
      </p>
      <a href="{% url 'login' %}" class="inline-block w-full py-4 bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all text-lg tracking-tight">
        Proceed to Login
      </a>
    </div>
  </div>
</div>
{% endblock %}
