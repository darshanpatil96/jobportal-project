{% extends "base.html" %}
{% block title %}Reset password{% endblock %}

{% block content %}
<div class="py-24">
  <div class="max-w-xl mx-auto px-6">
    <div class="bg-white p-10 md:p-12 rounded-[40px] shadow-2xl shadow-indigo-200/50 border border-slate-100 italic">
      <div class="mb-8">
        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-2">Account Recovery</h1>
        <p class="text-slate-500 font-medium">Enter your registered email address to receive secure reset instructions.</p>
      </div>

      <form method="post" class="space-y-6">
        {% csrf_token %}
        <div class="space-y-1.5">
          <label for="id_email" class="block text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">Email Address</label>
          <input type="email" name="email" id="id_email" required class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 text-slate-900 font-medium focus:outline-none focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 transition-all">
        </div>
        
        <button type="submit" class="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-700 shadow-xl shadow-indigo-100 active:scale-95 transition-all text-lg tracking-tight">
          Send Recovery Link
        </button>
      </form>
      
      <div class="mt-8 pt-8 border-t border-slate-50 text-center">
        <a href="{% url 'login' %}" class="text-sm font-bold text-indigo-600 hover:text-indigo-700">Back to Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
